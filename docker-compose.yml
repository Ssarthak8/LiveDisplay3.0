services:
  mongodb:
    image: mongo:7
    container_name: room-scheduler-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: room-scheduler-api
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/room-scheduler
      - JWT_SECRET=production-secret-change-me
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:5173
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: room-scheduler-ui
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
